<div class="qe">
  <header class="qe__toolbar">
    <button class="qe__tool-btn qe__tool-btn--back" type="button" title="voltar" (click)="cancel()">
      <i class="ti ti-arrow-left"></i>
    </button>

    <div class="qe__title-wrap">
      <i class="ti ti-pencil qe__title-icon" aria-hidden="true"></i>
      <input
        class="qe__title-input"
        type="text"
        placeholder="título da quest…"
        [value]="title()"
        (input)="title.set($any($event.target).value); markDirty()"
      />
    </div>

    <div class="qe__toolbar-actions">
      <span class="qe__status-badge">
        {{ isEdit ? 'edição' : 'criação' }}
      </span>

      <button class="qe__cancel-btn" type="button" (click)="cancel()">cancelar</button>

      <button
        class="qe__save-btn"
        type="button"
        (click)="saveQuest()"
        [disabled]="loading() || saving()"
      >
        @if (saving()) {
          <i class="ti ti-loader-2 qe__spin"></i> salvando…
        } @else {
          <i class="ti ti-device-floppy"></i> salvar
        }
      </button>
    </div>
  </header>

  @if (loading()) {
    <app-page-loader message="Carregando quest…" />
  }

  <div class="qe__body">
    <div class="qe__meta">
      <label class="qe__field">
        <span class="qe__label">descrição</span>
        <textarea
          class="qe__input qe__input--textarea"
          rows="2"
          placeholder="descreva a questline…"
          [value]="description()"
          (input)="description.set($any($event.target).value); markDirty()"
        ></textarea>
      </label>

      <label class="qe__field qe__field--status">
        <span class="qe__label">status</span>
        <select
          class="qe__input qe__input--select"
          [value]="questStatus()"
          (change)="questStatus.set($any($event.target).value); markDirty()"
        >
          @for (s of statuses; track s.value) {
            <option [value]="s.value">{{ s.label }}</option>
          }
        </select>
      </label>
    </div>

    <app-quest-editor-list
      [nodes]="nodes()"
      [edges]="edges()"
      (graphChange)="onGraphChange($event)"
    />
  </div>
</div>

@if (saving()) {
  <div class="qe__fullscreen-overlay" aria-live="assertive" aria-label="Salvando quest…">
    <i class="ti ti-loader-2 qe__fullscreen-overlay-spin" aria-hidden="true"></i>
    <span>salvando quest…</span>
  </div>
}
