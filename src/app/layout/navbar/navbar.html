<nav class="navbar">
  <a class="navbar__brand" routerLink="/home">
    <span class="navbar__brand-text">Soul<span class="navbar__brand-accent">Guide</span></span>
  </a>

  <ul class="navbar__links">
    @for (link of navLinks; track link.path) {
      <li>
        <a
          class="navbar__link"
          [routerLink]="link.path"
          routerLinkActive="navbar__link--active"
          [routerLinkActiveOptions]="{ exact: false }"
        >
          {{ link.label }}
        </a>
      </li>
    }
  </ul>
</nav>
