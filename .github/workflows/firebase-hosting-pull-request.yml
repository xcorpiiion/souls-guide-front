name: Preview — Firebase Hosting on PR

on:
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:

  # ── Job 1: Qualidade ────────────────────────────────────────────────────────
  quality:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npx ng test --watch=false

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-pr
          path: dist/soulguide/browser
          retention-days: 1

  # ── Job 2: Deploy preview ───────────────────────────────────────────────────
  preview:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-pr
          path: dist/soulguide/browser

      - name: Deploy preview channel
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          npx firebase-tools hosting:channel:deploy pr-${PR_NUMBER} \
            --project soulsguide-f2b59 \
            --only hosting \
            --expires 7d
