name: CI/CD — SoulGuide

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  # ── Job 1: Qualidade ────────────────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        id: typecheck
        run: npx tsc --noEmit

      - name: Lint
        id: lint
        run: npm run lint

      - name: Run tests with coverage
        id: tests
        run: |
          set -o pipefail
          npx ng test --coverage --watch=false 2>&1 | tee test-output.txt
          echo "TESTS_PASSED=$(grep -oP '\d+ passed' test-output.txt | tail -1)" >> $GITHUB_ENV
          echo "COVERAGE=$(grep -oP 'Lines\s+:\s+\K[\d.]+' test-output.txt | head -1)" >> $GITHUB_ENV

      - name: Build
        id: build
        run: |
          npm run build 2>&1 | tee build-output.txt
          SIZE=$(du -sh dist/soulguide/browser 2>/dev/null | cut -f1 || echo "?")
          echo "BUILD_SIZE=$SIZE" >> $GITHUB_ENV

      - name: SonarCloud Scan
        id: sonar
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload dist artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/soulguide/browser
          retention-days: 1

      - name: Job Summary
        if: always()
        run: |
          echo "## ⚔️ SoulGuide — Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.typecheck.outcome }}" = "success" ]; then
            echo "| Type check | ✅ passou |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Type check | ❌ falhou |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.lint.outcome }}" = "success" ]; then
            echo "| Lint | ✅ 0 erros |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Lint | ❌ falhou |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo "| Testes | ✅ ${TESTS_PASSED} · cobertura ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Testes | ❌ falhou |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "| Build | ✅ ${BUILD_SIZE} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Build | ❌ falhou |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.sonar.outcome }}" = "success" ]; then
            echo "| SonarCloud | ✅ Quality Gate passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SonarCloud | ❌ falhou |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Branch: \`${{ github.ref_name }}\` · Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Job 2: Deploy DEV ───────────────────────────────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/soulguide/browser

      - name: Authenticate to Google
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOULSGUIDE_F2B59 }}

      - name: Deploy to DEV channel
        run: npx firebase-tools hosting:channel:deploy dev --project soulsguide-f2b59 --only hosting --use-application-default-credentials

      - name: Deploy Summary
        run: |
          echo "## 🚀 SoulGuide — Deploy DEV" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | \`dev channel\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Deploy PROD ──────────────────────────────────────────────────────
  deploy-prod:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/soulguide/browser

      - name: Authenticate to Google
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOULSGUIDE_F2B59 }}

      - name: Deploy to PROD (live channel)
        run: npx firebase-tools deploy --project soulsguide-f2b59 --only hosting --use-application-default-credentials

      - name: Deploy Summary
        run: |
          echo "## 🚀 SoulGuide — Deploy PROD" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://soulsguide-f2b59.web.app |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
