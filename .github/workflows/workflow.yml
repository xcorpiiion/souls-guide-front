name: CI - soulguide

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Etapa 1: Instalar dependências ───────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Etapa 2: Type check ──────────────────────────────────────────────────
      - name: Type check
        id: typecheck
        run: npx tsc --noEmit

      # ── Etapa 3: Lint ────────────────────────────────────────────────────────
      - name: Lint
        id: lint
        run: npm run lint

      # ── Etapa 4: Testes com coverage ─────────────────────────────────────────
      - name: Run tests
        id: tests
        run: |
          npx ng test --coverage --watch=false 2>&1 | tee test-output.txt
          echo "TESTS_PASSED=$(grep -oP '\d+ passed' test-output.txt | tail -1)" >> $GITHUB_ENV
          echo "COVERAGE=$(grep -oP 'Lines\s+:\s+\K[\d.]+' test-output.txt)" >> $GITHUB_ENV

      # ── Etapa 5: Build ───────────────────────────────────────────────────────
      - name: Build
        id: build
        run: |
          npm run build 2>&1 | tee build-output.txt
          SIZE=$(du -sh dist/soulguide/browser 2>/dev/null | cut -f1 || echo "?")
          echo "BUILD_SIZE=$SIZE" >> $GITHUB_ENV

      # ── Etapa 6: SonarCloud ──────────────────────────────────────────────────
      - name: SonarCloud Scan
        id: sonar
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── Etapa 7: Job Summary ─────────────────────────────────────────────────
      - name: Job Summary
        if: always()
        run: |
          echo "## 🗡️ SoulGuide — Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.typecheck.outcome }}" = "success" ]; then
            echo "| Type check | ✅ passou |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Type check | ❌ falhou |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.lint.outcome }}" = "success" ]; then
            echo "| Lint | ✅ 0 erros |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Lint | ❌ falhou |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo "| Testes | ✅ ${TESTS_PASSED} · cobertura ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Testes | ❌ falhou |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "| Build | ✅ ${BUILD_SIZE} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Build | ❌ falhou |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.sonar.outcome }}" = "success" ]; then
            echo "| SonarCloud | ✅ Quality Gate passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SonarCloud | ❌ falhou |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Branch: \`${{ github.ref_name }}\` · Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
