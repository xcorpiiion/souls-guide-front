name: CI - soulguide

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Etapa 1: Instalar dependências ───────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Etapa 2: Type check ──────────────────────────────────────────────────
      - name: Type check
        run: npx tsc --noEmit

      # ── Etapa 3: Testes ──────────────────────────────────────────────────────
      - name: Run tests
        run: npx ng test --coverage --watch=false

      # ── Etapa 4: Build ───────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── Etapa 5: SonarCloud ──────────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
